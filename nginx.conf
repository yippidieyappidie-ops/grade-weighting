server {
    listen 80;
    server_name localhost;

    # Root: Landing page principal
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Carpeta /app: Panel de profesores
    location /app {
        alias /usr/share/nginx/html/app/;
        index index.html;
        try_files $uri $uri/ /app/index.html;
    }

    # Carpeta /admin: Panel de control de colegios
    location /admin {
        alias /usr/share/nginx/html/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # Carpeta /colegios: Vistas de instituciones
    location /colegios {
        alias /usr/share/nginx/html/colegios/;
        index index.html;
        try_files $uri $uri/ /colegios/index.html;
    }
}
