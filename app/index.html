<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grade Weighting — Dashboard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --ink: #1a1a2e;
      --ink-light: #4a4a6a;
      --cream: #faf8f3;
      --paper: #ffffff;
      --accent: #c84b31;
      --accent-light: #f5ede9;
      --gold: #e8a838;
      --green: #2d6a4f;
      --green-light: #d8f3dc;
      --border: #e2ddd6;
      --radius: 12px;
      --radius-sm: 8px;
    }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      margin: 0;
    }
    
    /* LOGIN SCREEN */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-card {
      background: var(--paper);
      border-radius: var(--radius);
      padding: 48px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(26,26,46,0.13);
      text-align: center;
    }
    
    .login-card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      margin-bottom: 8px;
      color: var(--ink);
    }
    
    .login-card .subtitle {
      color: var(--ink-light);
      font-size: 15px;
      margin-bottom: 32px;
    }
    
    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 28px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-google:hover {
      background: #2d2d4a;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(26,26,46,0.2);
    }
    
    .login-note {
      margin-top: 24px;
      font-size: 13px;
      color: var(--ink-light);
      line-height: 1.6;
    }
    
    /* DASHBOARD */
    .header {
      background: var(--ink);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid var(--accent);
    }
    
    .header-logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: #fff;
      letter-spacing: -0.5px;
    }
    
    .header-logo span { color: var(--gold); }
    
    .header-user {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .user-info {
      text-align: right;
      font-size: 14px;
      color: rgba(255,255,255,0.9);
    }
    
    .user-email {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    
    .btn-logout {
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-logout:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    
    .welcome {
      margin-bottom: 40px;
    }
    
    .welcome h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      margin-bottom: 8px;
    }
    
    .welcome p {
      color: var(--ink-light);
      font-size: 15px;
    }
    
    .card {
      background: var(--paper);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 2px 16px rgba(26,26,46,0.08);
    }
    
    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      margin-bottom: 20px;
    }
    
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary:hover {
      background: #a83a22;
      transform: translateY(-1px);
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-light);
    }
    
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    
    .hidden { display: none !important; }
    
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--ink-light);
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h1>Grade <span style="color: var(--gold);">Weighting</span></h1>
    <p class="subtitle">Sistema de gestión de notas para colegios</p>
    
    <button class="btn-google" id="loginBtn">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Iniciar sesión con Google
    </button>
    
    <p class="login-note">
      Solo para colegios con cuenta activa.<br>
      ¿Eres profesor? <a href="/" style="color: var(--accent);">Usa la calculadora gratis</a>
    </p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
  <header class="header">
    <div class="header-logo">
      Grade <span>Weighting</span>
    </div>
    <div class="header-user">
      <div class="user-info">
        <div id="userName"></div>
        <div class="user-email" id="userEmail"></div>
      </div>
      <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
    </div>
  </header>
  
  <main class="main">
    <div class="welcome">
      <h1>Mis clases</h1>
      <p>Gestiona las evaluaciones de tus alumnos</p>
    </div>
    
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0;">Evaluaciones activas</h2>
        <button class="btn-primary" id="newClassBtn">
          + Nueva evaluación
        </button>
      </div>
      
      <div id="classesList" class="loading">
        Cargando tus clases...
      </div>
    </div>
  </main>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyC0trECUS1g7CpQjGQtvjFim5QgcKVBfUs",
    authDomain: "gradeweighting.com",
    projectId: "grade-weighting",
    storageBucket: "grade-weighting.firebasestorage.app",
    messagingSenderId: "567298019231",
    appId: "1:567298019231:web:18c435e0a6808b7bd5f7aa"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  
  let currentUser = null;
  
  // Login con Google
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const provider = new GoogleAuthProvider();
    try {
      const result = await signInWithPopup(auth, provider);
      console.log('Login exitoso:', result.user.email);
    } catch (error) {
      console.error('Error al hacer login:', error);
      alert('Error al iniciar sesión: ' + error.message);
    }
  });
  
  // Logout
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      await signOut(auth);
      location.reload();
    } catch (error) {
      console.error('Error al cerrar sesión:', error);
    }
  });
  
  // Nueva clase
  document.getElementById('newClassBtn').addEventListener('click', () => {
    alert('Próximamente: crear nueva clase');
  });
  
  // Detectar estado de autenticación
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('userName').textContent = user.displayName || 'Profesor';
      document.getElementById('userEmail').textContent = user.email;
      loadClasses();
    } else {
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('dashboard').classList.add('hidden');
    }
  });
  
  // Cargar clases del profesor
  function loadClasses() {
    const classesList = document.getElementById('classesList');
    
    classesList.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📚</div>
        <p><strong>Aún no tienes evaluaciones</strong></p>
        <p style="font-size: 14px; margin-top: 8px;">
          Haz clic en "Nueva evaluación" para crear tu primera clase
        </p>
      </div>
    `;
  }
</script>

</body>
</html>
